<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.min.css">
    <link rel="stylesheet" href="styles.css">
	<link rel="icon" href="logo.png">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header class="header">
            <h1 class="title">Tic Tac Toe</h1>
            <p class="subtitle">Beat the Unbeatable AI</p>
        </header>

        <section class="game-info">
            <div class="player-card" id="card-p1">
                <span class="player-label">Player 1</span>
                <span class="player-mark">O</span>
            </div>
            <div class="vs">VS</div>
            <div class="player-card" id="card-p2">
                <span class="player-label">AI (Minimax)</span>
                <span class="player-mark">X</span>
            </div>
        </section>

        <section class="board-container">
            <div class="board" id="board">
                <div class="cell" id="0"></div>
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
            </div>
        </section>

        <section class="controls">
            <button class="btn-restart" id="restart-btn" onClick="startGame()">
                <i class="ri-refresh-line"></i> Restart Game
            </button>
        </section>
    </main>

    <div class="modal-overlay" id="endgame-modal">
        <div class="modal-content">
            <h2 class="modal-title">Game Over</h2>
            <p class="modal-text" id="winner-text"></p>
            <button class="btn-primary" onClick="startGame()">Play Again</button>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 Mohammad Hassieb. Modernized for Showcase.</p>
            <div class="social-links">
                <a href="https://github.com/hassiebb" target="_blank" title="GitHub"><i class="ri-github-fill"></i></a>
                <a href="https://www.linkedin.com/in/mo-hassieb/" target="_blank" title="LinkedIn"><i class="ri-linkedin-fill"></i></a>
                <a href="https://wa.link/fthmku" target="_blank" title="WhatsApp"><i class="ri-whatsapp-fill"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
